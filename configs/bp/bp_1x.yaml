model:
  # Architecture selectors — see conformer_asr/{encoders,decoders}/__init__.py
  # for the registered options.
  encoder_type: conformer
  decoder_type: bart
  # Conformer-M sized to match configs/cnns/c4x.yaml so the BP-1x run is a
  # like-for-like comparison vs. a static 4× stem (no BP compression).
  encoder_hidden_size: 256
  encoder_num_hidden_layers: 16
  encoder_num_attention_heads: 4
  encoder_intermediate_size: 1024
  encoder_conv_depthwise_kernel_size: 31
  encoder_hidden_dropout: 0.05
  encoder_attention_dropout: 0.05
  encoder_activation_dropout: 0.05
  encoder_layerdrop: 0.1
  n_mels: 80
  n_fft: 400
  hop_length: 160
  # Diagnostic BP run with prior=1.0 (target = "every frame is a boundary",
  # i.e. no BP compression). 4× Conv2d frontend feeds the BP at 25 Hz; the
  # learned BP MLP still runs and the binomial aux loss is still applied,
  # but the prior pulls the count toward n_valid rather than toward a
  # fraction of it. Compared to bp_8x.yaml this isolates whether the
  # collapse dynamics depend on the target compression ratio: if the BP
  # still drifts toward 1 boundary even when the loss is asking for n,
  # the bug isn't about the prior value — it's structural.
  #
  # ``init_prior_bias: false`` skips the manual zero-weight + logit(prior)
  # initialization on boundary_mlp[-1], leaving HF's default linear init
  # in place. Lets us check whether the artificial saturated-bias start
  # is contributing to the collapse trajectory.
  #
  # The Binomial(p=prior) is degenerate at prior=1 (log_prob=-inf for any
  # k<n); _binomial_loss clamps the prior to (1e-4, 1-1e-4) before
  # constructing the distribution, so prior=1.0 is effectively prior≈0.9999
  # for the loss term while the YAML stays declarative.
  downsampler:
    type: boundary_predictor
    kwargs:
      strides: [[2, 2], [2, 2]]
      prior: 1.0
      temp: 0.2
      mlp_dropout: 0.1
      loss_weight: 10.0
      boundary_mode: learned
      init_prior_bias: false
      # Diagnostic: cut the main-task gradient from the BP MLP. The binomial
      # is then the *only* signal training boundary scoring, so collapse vs.
      # convergence-to-prior tells us whether the indirect path was the
      # culprit (collapse stops) or the binomial gradient itself is
      # structurally broken under STE+RelaxedBernoulli (collapse persists).
      bp_isolated: true
  decoder_d_model: 256
  decoder_layers: 4
  decoder_attention_heads: 4
  decoder_ffn_dim: 1024
  decoder_dropout: 0.05
  decoder_max_position_embeddings: 448
  ctc_enabled: true
  ctc_weight: 0.3
  input_normalize_freeze_epochs: 4
  spec_aug_time_masks: 4
  spec_aug_time_length_low: 15
  spec_aug_time_length_high: 25
  spec_aug_feature_masks: 4
  spec_aug_feature_length_low: 10
  spec_aug_feature_length_high: 15
  spec_aug_warmup_steps: 1000

data:
  dataset_id: openslr/librispeech_asr
  subset: all960
  eval_split: validation.clean
  test_split: test.clean
  sampling_rate: 16000
  max_audio_seconds: 20.0
  speed_perturbations: [0.9, 1.0, 1.1]
  num_proc: 0
  tokenizer_dir: null
  cache_dir: /fs/scratch/PAS2836/lees_stuff/hf_cache

train:
  output_dir: outputs/run-bp-1x
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 8
  effective_batch_size: 256
  gradient_accumulation_steps: 0
  learning_rate: 1.0e-3
  warmup_steps: 2500
  num_train_epochs: 30.0
  weight_decay: 1.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.98
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  label_smoothing_factor: 0.1
  lr_scheduler_type: inverse_sqrt
  logging_steps: 10
  save_total_limit: 3
  bf16: true
  fp16: false
  gradient_checkpointing: false
  group_by_length: true
  dataloader_num_workers: 8
  dataloader_prefetch_factor: 4
  report_to: wandb
  seed: 42
  generation_max_length: 300
  generation_num_beams: 1

wandb:
  enabled: true
  project: conformer-asr-librispeech
  entity: null
  run_name: conformer-bp-1x
  group: null
  tags: []
  notes: ""
  watch_model: false
  log_preds_table: true
  log_preds_n: 16
