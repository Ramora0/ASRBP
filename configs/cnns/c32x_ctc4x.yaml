model:
  # Architecture selectors — see conformer_asr/{encoders,decoders}/__init__.py
  # for the registered options.
  encoder_type: conformer
  decoder_type: bart
  # Conformer-M, sized to match the rest of cnns/.
  encoder_hidden_size: 256
  encoder_num_hidden_layers: 16
  encoder_num_attention_heads: 4
  encoder_intermediate_size: 1024
  encoder_conv_depthwise_kernel_size: 31
  encoder_hidden_dropout: 0.05
  encoder_attention_dropout: 0.05
  encoder_activation_dropout: 0.05
  encoder_layerdrop: 0.1
  n_mels: 80
  n_fft: 400
  hop_length: 160
  # 32× conv2d stem (same stride list as c32x.yaml: [2,2] × 2 then [2,1] × 3,
  # 2×2×2×2×2 = 32). The trick here is the ``ctc_tap_after_layer: 2`` knob:
  # the first two stride-2 layers do the 4× compression and a separate
  # projection feeds the CTC head off that intermediate tensor (post-4×,
  # 25 Hz), while the remaining three [2,1] layers continue compressing
  # straight into the Conformer at 32× (3.125 Hz).
  #
  # CTC gradient flows through layers 1-2 + the tap projection only — layers
  # 3-5 and the Conformer are trained purely by AED. Pairs with
  # ``ctc_input: post_cnn`` below to wire the head to the tap.
  downsampler:
    type: conv2d
    kwargs:
      strides: [[2, 2], [2, 2], [2, 1], [2, 1], [2, 1]]
      ctc_tap_after_layer: 2
  decoder_d_model: 256
  decoder_layers: 4
  decoder_attention_heads: 4
  decoder_ffn_dim: 1024
  decoder_dropout: 0.05
  decoder_max_position_embeddings: 448
  ctc_enabled: true
  ctc_weight: 0.3
  # Tap CTC at the post-4× intermediate (25 Hz) instead of the encoder
  # output (3.125 Hz). At 32× total compression the encoder rate is too low
  # for CTC alignment to stay viable on long transcripts; here CTC supervises
  # the higher-rate intermediate where ``ctc_viable_pct`` should sit at ~1.0
  # and still inject monotonic-alignment gradient into the early stem.
  ctc_input: post_cnn
  input_normalize_freeze_epochs: 4
  spec_aug_time_masks: 4
  spec_aug_time_length_low: 15
  spec_aug_time_length_high: 25
  spec_aug_feature_masks: 4
  spec_aug_feature_length_low: 10
  spec_aug_feature_length_high: 15
  spec_aug_warmup_steps: 1000

data:
  dataset_id: openslr/librispeech_asr
  subset: all960
  eval_split: validation.clean
  test_split: test.clean
  sampling_rate: 16000
  max_audio_seconds: 20.0
  speed_perturbations: [0.9, 1.0, 1.1]
  num_proc: 0
  tokenizer_dir: null
  cache_dir: /fs/scratch/PAS2836/lees_stuff/hf_cache

train:
  output_dir: outputs/run-c32x-ctc4x
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 8
  effective_batch_size: 256
  gradient_accumulation_steps: 0
  learning_rate: 1.0e-3
  warmup_steps: 2500
  num_train_epochs: 30.0
  weight_decay: 1.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.98
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  label_smoothing_factor: 0.1
  lr_scheduler_type: inverse_sqrt
  logging_steps: 10
  save_total_limit: 3
  bf16: true
  fp16: false
  gradient_checkpointing: false
  group_by_length: true
  dataloader_num_workers: 8
  dataloader_prefetch_factor: 4
  report_to: wandb
  seed: 42
  generation_max_length: 300
  generation_num_beams: 1
  swa_enabled: true
  swa_start_frac: 0.75

wandb:
  enabled: true
  project: conformer-asr-librispeech
  entity: null
  run_name: conformer-c32x-ctc4x
  group: null
  tags: []
  notes: ""
  watch_model: false
  log_preds_table: true
  log_preds_n: 16
