model:
  # Architecture selectors — see conformer_asr/{encoders,decoders}/__init__.py
  # for the registered options.
  encoder_type: conformer
  decoder_type: bart
  # Conformer-M sized to match configs/cnns/c4x.yaml so the cross-attn run is
  # a like-for-like comparison vs. the static 4× stem (and a 2× coarser
  # frame rate downstream — encoder ops drop accordingly).
  encoder_hidden_size: 256
  encoder_num_hidden_layers: 16
  encoder_num_attention_heads: 4
  encoder_intermediate_size: 1024
  encoder_conv_depthwise_kernel_size: 31
  encoder_hidden_dropout: 0.05
  encoder_attention_dropout: 0.05
  encoder_activation_dropout: 0.05
  encoder_layerdrop: 0.1
  n_mels: 80
  n_fft: 400
  hop_length: 160
  # Cross-attention downsampler — feature extractor only. C4x-style Conv2d
  # frontend (4× time stem) + dilated layers produces a 25 Hz post-CNN
  # sequence; the strided pick (every 4th frame) is the encoder's input at
  # ≈6.25 Hz. The cross-attn refinement itself is *interleaved* between
  # conformer layers — see ``cross_attn_layer_indices`` below — so this
  # downsampler now just owns the CNN stack and the K/V cache that every
  # interleaved tap reads from.
  #
  # Dilation schedule [1, 2] is the à trous equivalent of c16x's remaining
  # stride-2, stride-2 cascade after the strided frontend: at jump=4, a
  # d=1 kernel reads 3 adjacent layer-2 frames (= what c16x layer 3 reads),
  # and a d=2 kernel on top of that replicates layer 4. RF = 31 input
  # frames after picking every 4th — exactly matches c16x's pure-stride
  # stem with dense coverage. This is what gives the interleaved XA blocks
  # something rich to attend to.
  #
  # See conformer_asr/downsamplers/cross_attn.py for the full pipeline.
  downsampler:
    type: cross_attn
    kwargs:
      strides: [[2, 2], [2, 2]]
      dilations: [1, 2]
      stride: 4
  # Interleaved cross-attention. After each (1-indexed) conformer layer
  # listed here, a CrossAttnBlock re-attends the residual stream against the
  # downsampler's cached 25 Hz post-CNN feature map. All four taps land in
  # the first half of the stack, where the conformer is still building
  # acoustic / phonetic representations and Q is still close enough to the
  # raw post-CNN K/V space for attention patterns to be meaningful. Skip
  # layer 1 so the conformer establishes a baseline residual first;
  # second-half layers (9–16) handle subword / word / contextual work and
  # don't get a tap. K/V cache is freed after layer 8.
  cross_attn_layer_indices: [1,2, 4, 8]
  cross_attn_num_heads: 4
  cross_attn_dropout: 0.0
  decoder_d_model: 256
  decoder_layers: 4
  decoder_attention_heads: 4
  decoder_ffn_dim: 1024
  decoder_dropout: 0.05
  decoder_max_position_embeddings: 448
  ctc_enabled: true
  ctc_weight: 0.3
  input_normalize_freeze_epochs: 4
  spec_aug_time_masks: 4
  spec_aug_time_length_low: 15
  spec_aug_time_length_high: 25
  spec_aug_feature_masks: 4
  spec_aug_feature_length_low: 10
  spec_aug_feature_length_high: 15
  spec_aug_warmup_steps: 1000

data:
  dataset_id: openslr/librispeech_asr
  subset: all960
  eval_split: validation.clean
  test_split: test.clean
  sampling_rate: 16000
  max_audio_seconds: 20.0
  speed_perturbations: [0.9, 1.0, 1.1]
  num_proc: 0
  tokenizer_dir: null
  cache_dir: /fs/scratch/PAS2836/lees_stuff/hf_cache

train:
  output_dir: outputs/run-xa-16x
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 8
  effective_batch_size: 256
  gradient_accumulation_steps: 0
  learning_rate: 1.0e-3
  warmup_steps: 2500
  num_train_epochs: 30.0
  weight_decay: 1.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.98
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  label_smoothing_factor: 0.1
  lr_scheduler_type: inverse_sqrt
  logging_steps: 10
  save_total_limit: 3
  bf16: true
  fp16: false
  gradient_checkpointing: false
  group_by_length: true
  dataloader_num_workers: 8
  dataloader_prefetch_factor: 4
  report_to: wandb
  seed: 42
  generation_max_length: 300
  generation_num_beams: 1
  swa_enabled: true
  swa_start_frac: 0.75

wandb:
  enabled: true
  project: conformer-asr-librispeech
  entity: null
  run_name: conformer-xa-16x
  group: null
  tags: []
  notes: ""
  watch_model: false
  log_preds_table: true
  log_preds_n: 16
